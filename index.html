<!doctype html>
<html lang="fr" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Unraid Dashboard</title>
    <meta name="description" content="Monitoring et contrôle du serveur Unraid" />
    <meta name="theme-color" content="#09090b" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <!-- iOS : ajout à l'écran d'accueil en mode app -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Unraid" />
    <link rel="apple-touch-icon" href="/icon-180.png" />
    <!-- Fix pour forcer le mode standalone sur certains iOS -->
    <script>
      if (window.navigator.standalone) {
        document.documentElement.classList.add('is-standalone');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
